services:
  - type: web
    name: pw-video-downloader
    runtime: python
    plan: free
    buildCommand: |
      apt-get update
      apt-get install -y ffmpeg
      pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PW_TOKEN
        value: your_token_here  # <-- Yahan apna token daalein
        sync: false
